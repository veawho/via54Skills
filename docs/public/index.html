<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>via54Skills</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 32rem;
      margin: 6rem auto;
      padding: 0 1.5rem;
      color: #1f2937;
      line-height: 1.6;
      text-align: center;
    }
    a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
    }
    a:hover { text-decoration: underline; }
    code {
      background: #f3f4f6;
      padding: 0.1em 0.3em;
      border-radius: 3px;
      font-size: 0.95em;
    }
  </style>
</head>
<body>
  <p>via54Skills</p>
  <p>Redirecting to <a href="/via54Skills/zh/">中文首页</a> &middot; <a href="/via54Skills/en/">English</a></p>
  <p><small>If you are not redirected, <a id="manual-redirect" href="/via54Skills/zh/">click here</a>.</small></p>
  <script>
    // Detect browser language and redirect to the matching locale.
    // Falls back to /zh/ for browsers without an Accept-Language header.
    (function () {
      var path = location.pathname;
      var prefix = '/via54Skills/';
      var target = prefix + 'zh/';
      try {
        var lang = (navigator.language || 'zh').toLowerCase();
        if (lang.indexOf('en') === 0) target = prefix + 'en/';
      } catch (_) {}
      // Use replace() so the redirect doesn't add a back-button entry.
      location.replace(target);
    })();
  </script>
</body>
